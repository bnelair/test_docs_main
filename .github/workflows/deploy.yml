name: Aggregate and Deploy Docs

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout central repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install sphinx sphinx-book-theme

      - name: Build main landing page
        run: sphinx-build -b html docs_src/source public

      - name: Checkout Test Docs A
        uses: actions/checkout@v4
        with:
          repository: bnelair/test_docs_A
          ref: docs-build
          path: public/docs_A
          token: ${{ secrets.DOCS_PAT }}

      - name: Checkout Test Docs B
        uses: actions/checkout@v4
        with:
          repository: bnelair/test_docs_B
          ref: docs-build
          path: public/docs_B
          token: ${{ secrets.DOCS_PAT }}

      - name: Bypass Jekyll processing
        run: touch public/.nojekyll

      - name: Build Unified Search Index
        run: npx -y pagefind --site public

      - name: Upload artifact to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4